spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2016Dialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  devtools:
    restart:
      enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${TIME_EXPIRATION:120}
    expiration-refresh-minutes: ${TIME_REFRESH_EXPIRATION}
  cors:
    allowOrigins: ${CORS_ORIGINS}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2016Dialect
    open-in-view: false

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${TIME_EXPIRATION:120}
  cors:
    allowOrigins:


admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:Admin123!}
  nombre: ${ADMIN_NOMBRE:Antigua}
  apellido: ${ADMIN_APELLIDO:Burguers}
  email: ${ADMIN_EMAIL:antigua@gmail.com}
  dpi: ${ADMIN_DPI:0000000000000}
  telefono: ${ADMIN_TELEFONO:12345678}
  prefijo-telefono: ${ADMIN_PREFIJO:502}
  direccion: ${ADMIN_DIRECCION}

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: false